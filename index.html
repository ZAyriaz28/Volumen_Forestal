<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Volumen Forestal</title>
    <meta name="theme-color" content="#16a34a">
    
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.svg">
    
    <style>
        /* Fondo neutro y limpio para evitar reflejos molestos en el campo */
        body {
            background-color: #f4f6f8;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #212529;
            display: flex;
            align-items: center;
        }

        /* Tarjeta sólida blanca: máximo contraste con letras oscuras */
        .app-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 1.75rem 1.25rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .app-title {
            color: #1a202c;
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }

        /* Espaciado e inputs amplios para el uso táctil */
        .form-floating {
            margin-bottom: 1.1rem !important;
        }

        .form-floating > .form-control,
        .form-floating > .form-select {
            background-color: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
            height: 62px; /* Mayor altura para que el dedo no falle al tocar */
        }

        .form-floating > .form-control:focus,
        .form-floating > .form-select:focus {
            border-color: #16a34a;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
        }

        .form-floating label {
            color: #64748b;
            font-weight: 500;
            padding-left: 14px;
        }

        /* Botón principal verde sólido */
        .btn-calcular {
            background-color: #16a34a;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 1.15rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
            transition: all 0.2s ease;
        }

        .btn-calcular:active {
            background-color: #15803d;
            transform: scale(0.97);
        }

        /* Botón de instalación: oculto por defecto y con estilo claro */
        .btn-instalar {
            background-color: #ffffff;
            color: #16a34a;
            border: 2px dashed #16a34a;
            border-radius: 14px;
            padding: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .btn-instalar:active {
            background-color: #f0fdf4;
            transform: scale(0.97);
        }

        /* Caja de resultados clara y legible */
        .result-box {
            background-color: #f0fdf4;
            border: 1.5px solid #bbf7d0;
            border-radius: 18px;
            padding: 1.5rem 1rem;
            margin-bottom: 1.5rem;
        }

        .result-label {
            color: #166534;
            font-weight: 700;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
            margin-bottom: 0.4rem;
        }

        .result-value {
            font-size: 2.3rem;
            font-weight: 800;
            color: #15803d;
            margin: 0;
            line-height: 1;
        }

        /* Historial adaptable */
        .history-section {
            border-top: 1.5px solid #f1f5f9;
            padding-top: 1.25rem;
        }

        .history-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #475569;
            margin: 0;
        }

        .btn-clear {
            background: transparent;
            border: none;
            color: #ef4444;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .btn-clear:active {
            background-color: #fef2f2;
        }

        .history-list {
            max-height: 180px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Scroll fluido para móviles */
            padding-right: 4px;
            margin-top: 10px;
        }

        .history-list::-webkit-scrollbar {
            width: 5px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 5px;
        }

        .history-item {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-left: 4px solid #22c55e;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #334155;
        }
    </style>
</head>
<body>

    <div class="container-fluid px-3 py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                
                <div class="app-card">
                    <h3 class="text-center app-title">🌲 Calculadora de Volumen</h3>
                    
                    <div class="form-floating">
                        <select id="selectEspecie" class="form-select">
                            <option value="latifoliada">Latifoliada (Ff: 0.7)</option>
                            <option value="pinos">Pinos (Ff: 0.4)</option>
                        </select>
                        <label for="selectEspecie">Especie</label>
                    </div>

                    <div class="form-floating">
                        <input type="number" id="inputDap" class="form-control" step="0.01" inputmode="decimal" placeholder="0.00">
                        <label for="inputDap">DAP (Metros)</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="number" id="inputAltura" class="form-control" step="0.1" inputmode="decimal" placeholder="0.0">
                        <label for="inputAltura">Altura (Metros)</label>
                    </div>

                    <button id="btnCalcular" class="btn btn-calcular w-100 mb-4">Calcular Volumen</button>

                    <div class="result-box text-center">
                        <p class="result-label">RESULTADO ESTIMADO</p>
                        <h2 id="resultadoVolumen" class="result-value">0.0000<span style="font-size: 1.2rem; font-weight: 600;"> m³</span></h2>
                    </div>

                    <button id="btnInstalar" class="btn btn-instalar w-100 mb-4" style="display: none;">
                        ⬇️ Instalar Aplicación
                    </button>

                    <div class="history-section">
                        <div class="d-flex justify-content-between align-items-center">
                            <h4 class="history-title">🕒 Últimos Cálculos</h4>
                            <button id="btnLimpiar" class="btn-clear">Borrar todo</button>
                        </div>
                        <div id="listaHistorial" class="history-list">
                            </div>
                    </div>

                </div> </div>
        </div>
    </div>

    <script src="calculadora.js"></script>
    <script src="pwa-setup.js"></script>
</body>
</html>
